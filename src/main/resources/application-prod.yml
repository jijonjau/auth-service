spring:
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate # to use Flyway migrations

server:
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  endpoint:
    health:
      show-details: when_authorized
